; ============================================================================
; NEUROSENSE ESP8266 — PlatformIO Configuration
; ============================================================================
;
; Para compilar y subir:
;   pio run -t upload
;
; Para monitorear Serial:
;   pio device monitor -b 115200
;
; Compilar + subir + monitor:
;   pio run -t upload && pio device monitor -b 115200
;
; ============================================================================

[env:nodemcu]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 115200

; Dependencias gestionadas automáticamente
lib_deps =
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.3.0

; Opciones de compilación
build_flags =
    -D SERIAL_BAUD=115200

; Directorio del código fuente
src_dir = neurosense_esp8266

; ============================================================================
; Variante: Wemos D1 Mini
; ============================================================================
[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.3.0

build_flags =
    -D SERIAL_BAUD=115200

src_dir = neurosense_esp8266
